<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reels Lib" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <title>Reels Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>Reels Library</h1>
        <span class="reel-count" id="reelCount">0 reels</span>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search reels..." />
        </div>
        <button class="btn btn-primary desktop-only" id="addReelBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Add Reel
        </button>
      </div>
    </header>

    <!-- Category Tabs -->
    <nav class="category-bar">
      <div class="category-tabs" id="categoryTabs">
        <button class="tab active" data-category="all">All</button>
      </div>
      <button class="btn btn-ghost btn-sm" id="manageCategoriesBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3h7a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3"/><path d="M12 8v8M8 12h8"/></svg>
        <span class="manage-label">Manage</span>
      </button>
    </nav>

    <!-- Reels Grid -->
    <main class="reels-grid" id="reelsGrid">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
          <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 7h5M17 17h5"/>
        </svg>
        <h2>No reels yet</h2>
        <p>Tap <strong>+</strong> to save your first Reel or Short</p>
      </div>
    </main>

    <!-- Mobile FAB (Floating Action Button) -->
    <button class="fab mobile-only" id="addReelFab" aria-label="Add reel">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <!-- Add/Edit Reel Modal -->
  <div class="modal-overlay" id="reelModal">
    <div class="modal modal-add">
      <div class="modal-header">
        <h2 id="modalTitle">Add Reel</h2>
        <button class="btn-close" id="closeReelModal">&times;</button>
      </div>
      <form id="reelForm">
        <input type="hidden" id="reelId" />
        <div class="form-group">
          <label for="reelUrl">Instagram Reel URL</label>
          <div class="url-input-row">
            <input type="url" id="reelUrl" placeholder="Instagram Reel or YouTube Shorts URL..." required />
            <button type="button" class="btn btn-ghost btn-sm fetch-btn" id="fetchPreviewBtn">Preview</button>
          </div>
        </div>
        <div class="preview-area" id="previewArea">
          <div class="preview-placeholder">Paste a Reel or Shorts link and tap "Preview"</div>
        </div>
        <div class="form-group">
          <label for="reelTitle">Title / Note</label>
          <input type="text" id="reelTitle" placeholder="Give it a name to remember..." />
        </div>
        <div class="form-group">
          <label for="reelCategory">Category</label>
          <select id="reelCategory">
            <option value="">Uncategorized</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancelReelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Reel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Manage Categories Modal -->
  <div class="modal-overlay" id="categoryModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Manage Categories</h2>
        <button class="btn-close" id="closeCategoryModal">&times;</button>
      </div>
      <div class="category-form">
        <div class="form-group form-row">
          <input type="text" id="newCategoryName" placeholder="New category name..." />
          <input type="color" id="newCategoryColor" value="#6366f1" title="Pick a color" />
          <button class="btn btn-primary btn-sm" id="addCategoryBtn">Add</button>
        </div>
      </div>
      <ul class="category-list" id="categoryList"></ul>
    </div>
  </div>

  <!-- Reel Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal modal-detail">
      <div class="modal-header">
        <h2 id="detailTitle">Reel Details</h2>
        <button class="btn-close" id="closeDetailModal">&times;</button>
      </div>
      <div class="detail-body" id="detailBody"></div>
      <div class="detail-actions">
        <a class="btn btn-primary" id="detailOpenLink" href="#" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>
          Open in Instagram
        </a>
        <button class="btn btn-ghost" id="detailEditBtn">Edit</button>
        <button class="btn btn-danger" id="detailDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
