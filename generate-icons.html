<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
  <h2>Icon Generator</h2>
  <p>Right-click each image below and "Save image as..." to the <code>icons/</code> folder</p>
  <div style="display:flex;gap:40px;justify-content:center;margin-top:30px;flex-wrap:wrap">
    <div>
      <canvas id="c192" width="192" height="192"></canvas>
      <p>icon-192.png</p>
    </div>
    <div>
      <canvas id="c512" width="512" height="512"></canvas>
      <p>icon-512.png</p>
    </div>
  </div>
  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#ec4899"/>
      </linearGradient></defs>
      <rect width="512" height="512" rx="112" fill="url(#bg)"/>
      <rect x="100" y="80" width="312" height="352" rx="32" fill="none" stroke="#fff" stroke-width="24"/>
      <polygon points="220,190 220,322 330,256" fill="#fff"/>
      <rect x="140" y="388" width="80" height="8" rx="4" fill="#fff" opacity="0.6"/>
      <rect x="140" y="406" width="140" height="8" rx="4" fill="#fff" opacity="0.4"/>
    </svg>`;
    const blob = new Blob([svg], {type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    [192,512].forEach(size => {
      const canvas = document.getElementById('c'+size);
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => { ctx.drawImage(img, 0, 0, size, size); };
      img.src = url;
    });
  </script>
</body>
</html>
